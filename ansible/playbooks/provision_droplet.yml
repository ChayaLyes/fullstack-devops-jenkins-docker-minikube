---
- name: Provision DigitalOcean Infrastructure
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Ensure SSH key is registered on DigitalOcean
      community.digitalocean.digital_ocean_sshkey:
        oauth_token: "{{ do_token }}"
        name: "{{ do_ssh_key_name }}"
        ssh_pub_key: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"
        state: present
      register: ssh_key_result

    - name: Create Jenkins server droplet
      community.digitalocean.digital_ocean_droplet:
        oauth_token: "{{ do_token }}"
        state: present
        name: "{{ do_droplet_name }}"
        size: "{{ do_size }}"
        region: "{{ do_region }}"
        image: "{{ do_image }}"
        ssh_keys:
          - "{{ ssh_key_result.data.ssh_key.id }}"
        tags:
          - jenkins
          - ci-cd
        wait: true
        wait_timeout: 300
      register: droplet_result

    - name: Display server info
      debug:
        msg: "Jenkins server IP: {{ droplet_result.data.droplet.networks.v4[0].ip_address }}"

    - name: Write droplet IP into inventory
      replace:
        path: ../inventory/hosts.yml
        regexp: 'ansible_host: .*'
        replace: "ansible_host: {{ droplet_result.data.droplet.networks.v4[0].ip_address }}"

    - name: Wait for SSH to be available
      wait_for:
        host: "{{ droplet_result.data.droplet.networks.v4[0].ip_address }}"
        port: 22
        timeout: 120
        state: started
