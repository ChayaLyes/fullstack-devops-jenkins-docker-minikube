# DigitalOcean — token lu depuis la variable d'env DO_API_TOKEN
do_token: "{{ lookup('env', 'DO_API_TOKEN') }}"
do_region: fra1
do_size: s-2vcpu-4gb
do_image: ubuntu-22-04-x64
do_droplet_name: jenkins-server
do_ssh_key_name: jenkins-ci-key

# Jenkins
jenkins_port: 8080
jenkins_agent_port: 50000
jenkins_home: /opt/jenkins
