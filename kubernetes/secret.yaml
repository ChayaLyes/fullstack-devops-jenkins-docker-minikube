# Ce secret est généré dynamiquement par le script scripts/create-docker-secret-minikube.sh
# ou par Jenkins via kubectl create secret docker-registry.
# Ne pas appliquer ce fichier directement — utiliser le script à la place.
#
# Pour créer manuellement :
#   kubectl create secret docker-registry my-registry-key \
#     --docker-server=docker.io \
#     --docker-username=<DOCKER_USERNAME> \
#     --docker-password=<DOCKER_PASSWORD_OR_TOKEN> \
#     --docker-email=<EMAIL>
